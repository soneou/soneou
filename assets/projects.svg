    </linearGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse"><path d="M38 0H0V38" stroke="white" stroke-opacity=".04"/></pattern>
  </defs>
  <rect width="1200" height="430" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="430" rx="30" fill="url(#grid)"/>
