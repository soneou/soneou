<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Selected projects by Neou So</title>
  <desc id="desc">Four modern cards featuring AI, computer vision, machine learning, and PHP projects.</desc>
  <defs>
