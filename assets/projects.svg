      <stop stop-color="#172554"/><stop offset="0.5" stop-color="#312E81"/><stop offset="1" stop-color="#164E63"/>
    </linearGradient>
    <linearGradient id="accent" x1="70" y1="50" x2="1120" y2="390" gradientUnits="userSpaceOnUse">
